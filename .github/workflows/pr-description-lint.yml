name: pr-description-lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

jobs:
  validate-pr-description:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate PR description format
        env:
          PR_BODY_JSON: ${{ toJson(github.event.pull_request.body) }}
        run: |
          python3 - <<'PY'
          import json, os, sys

          body = json.loads(os.environ.get("PR_BODY_JSON") or '""') or ""
          required = [
              "#### Context",
              "#### TL;DR",
              "#### Summary",
              "#### Alternatives",
              "#### Test Plan",
          ]
          missing = [heading for heading in required if heading not in body]
          if missing:
              print("Missing required PR template headings:")
              for heading in missing:
                  print(f"- {heading}")
              sys.exit(1)
          PY
