name = "symphony-control-plane"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Routes / Access policy: the dev URL is symphony-control-plane.<subdomain>.workers.dev.
# Real Cloudflare Access (Zero Trust) JWT validation is Phase 8 work; the
# Worker currently uses a single shared bearer token in OPERATOR_TOKEN.
# Provision the token with:
#   wrangler secret put OPERATOR_TOKEN --name symphony-control-plane
#
# Public routes (no auth): GET / and GET /api/v1/healthz.
# Gated routes (Bearer): /api/v1/state, /api/v1/tenants, /api/v1/profiles.

# ---------------------------------------------------------------------------
# D1: control-plane index database (tenants, profiles, issues, runs, events,
# tool_calls, approvals, idempotency_records). See migrations/0001_init.sql.
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "symphony-control-plane"
# database_id is filled in by `bun run db:create` (or wrangler d1 create) and
# then committed. Until set, only `--local` migrations work.
database_id = "da72ce20-3e3d-4cf6-bc66-4d9aa71862f1"
migrations_dir = "migrations"

# ---------------------------------------------------------------------------
# Durable Objects: TenantAgent + ProjectAgent host the durable per-entity
# state machines. Identity is set via env.TENANT_AGENT.idFromName(...) and
# env.PROJECT_AGENT.idFromName(...). DO storage is the source of truth; D1
# is the queryable mirror.
# ---------------------------------------------------------------------------
[[durable_objects.bindings]]
name = "TENANT_AGENT"
class_name = "TenantAgent"

[[durable_objects.bindings]]
name = "PROJECT_AGENT"
class_name = "ProjectAgent"

[[durable_objects.bindings]]
name = "ISSUE_AGENT"
class_name = "IssueAgent"

# ---------------------------------------------------------------------------
# Workflows: ExecutionWorkflow drives the canonical 16-step run loop per
# target.md §8.4. Phase 5 PR-A scaffolding only — empty no-op steps. PR-C
# wires the real bodies.
# ---------------------------------------------------------------------------
[[workflows]]
binding = "EXECUTION_WORKFLOW"
name = "symphony-execution-workflow"
class_name = "ExecutionWorkflow"
script_name = "symphony-control-plane"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TenantAgent", "ProjectAgent"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["IssueAgent"]

# ---------------------------------------------------------------------------
# R2: artifact bucket for run bundles, transcripts, snapshots, tool payloads.
# Provisioned in a follow-up; placeholder kept here so the binding shape is
# documented next to the D1 binding.
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "symphony-runs"

# ---------------------------------------------------------------------------
# Queues: tracker-events transport. See target.md §11.
#
# symphony-tracker-events: cron-driven scheduler enqueues one
# TrackerRefreshMessage per active profile; the Worker queue() handler
# dispatches each to ProjectAgent.poll. Sync routes
# (POST /api/v1/projects/:tenant/:slug/actions/refresh and
# /api/v1/admin/run-scheduled) bypass the queue for immediate operator feedback.
# ---------------------------------------------------------------------------
[[queues.producers]]
binding = "TRACKER_EVENTS"
queue = "symphony-tracker-events"

[[queues.consumers]]
queue = "symphony-tracker-events"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "symphony-tracker-events-dlq"

# Phase 4 sub-cut 2: dispatch queue. Producer is the tracker-events
# consumer (handleTrackerRefresh enqueues one issue.dispatch per
# dispatch decision the reconcile harness emits). Consumer is the same
# Worker queue() handler dispatching by batch.queue.
[[queues.producers]]
binding = "DISPATCH"
queue = "symphony-dispatch"

[[queues.consumers]]
queue = "symphony-dispatch"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "symphony-dispatch-dlq"

# ---------------------------------------------------------------------------
# Cron Triggers: scheduled ProjectAgent polling. Phase 3 second cut.
# Every 5 minutes the Worker's scheduled() handler enumerates active
# profiles (status = 'active', archived_at IS NULL) and calls
# ProjectAgent.poll on each. Mirrors tracker state into D1; does NOT
# start runs (Phase 3 invariant). Disable polling for an individual
# project via POST /api/v1/projects/:t/:s/actions/{pause,drain}.
#
# Manual trigger for testing without waiting for the cron:
#   POST /api/v1/admin/run-scheduled  (gated by Bearer)
# ---------------------------------------------------------------------------
[triggers]
crons = ["*/5 * * * *"]
